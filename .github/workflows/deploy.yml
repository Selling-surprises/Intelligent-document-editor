name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 关键：允许写入分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 使用 npm install（你当前的方式）
      - name: Install dependencies
        run: npm install

      # 检查是否有 build 脚本，如果没有直接用 vite
      - name: Build
        run: |
          if npm run build --if-present; then
            echo "Build completed with npm run build"
          else
            echo "Using npx vite build"
            npx vite build
          fi

      # 确保 dist 目录存在
      - name: Verify dist
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "index.html not found!" && exit 1)

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true  # 强制创建干净的 gh-pages 分支
